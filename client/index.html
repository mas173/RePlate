<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RePlate | AI-Powered Food Waste Reduction Platform</title>
    <meta name="description" content="RePlate is an AI-powered food waste reduction platform connecting restaurants, hotels, and grocery stores with NGOs and shelters to redistribute surplus food. Save food, reduce CO2, and feed communities." />
    <meta name="keywords" content="food waste, food rescue, sustainability, AI food check, food redistribution, RePlate, NGO donations, surplus food, surplus packaging, environmental impact" />
    <meta name="author" content="RePlate Team" />
    <meta name="theme-color" content="#059669" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.getreplate.qzz.io/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.getreplate.qzz.io/" />
    <meta property="og:title" content="RePlate - Reduce Food Waste with AI & Support Communities" />
    <meta property="og:description" content="Connect surplus food with communities in need. AI-powered freshness analysis, real-time matching, and seamless donation tracking." />
    <meta property="og:image" content="https://www.getreplate.qzz.io/favicon.png" />
    <meta property="og:site_name" content="RePlate" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.getreplate.qzz.io/" />
    <meta name="twitter:title" content="RePlate - Reduce Food Waste with AI" />
    <meta name="twitter:description" content="Connect surplus food with communities in need. AI-powered freshness analysis, real-time matching, and seamless donation tracking." />
    <meta name="twitter:image" content="https://www.getreplate.qzz.io/favicon.png" />

    <!-- Mobile App Deep Link Mapping / App Indexing -->
    <link rel="alternate" href="android-app://com.mas173.replate/https/www.getreplate.qzz.io/" />

    <!-- Structured Data (JSON-LD Organization & Website) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "RePlate",
        "url": "https://www.getreplate.qzz.io/",
        "logo": "https://www.getreplate.qzz.io/favicon.png",
        "sameAs": [
          "https://github.com/mas173/RePlate"
        ],
        "description": "AI-powered food waste reduction platform connecting restaurants, hotels, and grocery stores with NGOs and shelters to redistribute surplus food."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "RePlate",
        "url": "https://www.getreplate.qzz.io/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.getreplate.qzz.io/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      (function() {
        const stored = localStorage.getItem('replate-theme');
        if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
